server {
    listen 80;

    location / {
        proxy_pass http://pokemon-trader:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /rust/ {
        proxy_pass http://maze-runner:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
