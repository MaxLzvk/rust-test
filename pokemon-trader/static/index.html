<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Trader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        header {
            background: #e63946;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(0,0,0,.3);
        }

        header h1 { font-size: 1.5rem; }

        #trainer-info {
            font-size: .9rem;
            opacity: .9;
        }

        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        button {
            background: #e63946;
            color: white;
            border: none;
            padding: .7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background .2s;
        }

        button:hover { background: #c1121f; }
        button:disabled { background: #555; cursor: not-allowed; }

        .trade-form {
            background: #16213e;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            gap: .5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .trade-form input {
            background: #0f3460;
            border: 1px solid #333;
            color: #eee;
            padding: .5rem;
            border-radius: 4px;
            font-size: .9rem;
        }

        .trade-form input::placeholder { color: #888; }

        #notification {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #2d6a4f;
            padding: .8rem 1.2rem;
            border-radius: 8px;
            display: none;
            animation: slideIn .3s ease;
            z-index: 100;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .collection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }

        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: transform .2s;
            cursor: pointer;
            position: relative;
        }

        .card:hover { transform: translateY(-4px); }

        .card.selected {
            outline: 3px solid #e63946;
        }

        .card img {
            width: 96px;
            height: 96px;
            image-rendering: pixelated;
        }

        .card h3 {
            text-transform: capitalize;
            margin: .5rem 0 .3rem;
            font-size: .95rem;
        }

        .card .types {
            display: flex;
            gap: .3rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .type-badge {
            font-size: .7rem;
            padding: .15rem .5rem;
            border-radius: 10px;
            text-transform: capitalize;
        }

        .type-fire { background: #f08030; }
        .type-water { background: #6890f0; }
        .type-grass { background: #78c850; }
        .type-electric { background: #f8d030; color: #333; }
        .type-psychic { background: #f85888; }
        .type-ice { background: #98d8d8; color: #333; }
        .type-dragon { background: #7038f8; }
        .type-dark { background: #705848; }
        .type-fairy { background: #ee99ac; color: #333; }
        .type-fighting { background: #c03028; }
        .type-flying { background: #a890f0; }
        .type-poison { background: #a040a0; }
        .type-ground { background: #e0c068; color: #333; }
        .type-rock { background: #b8a038; }
        .type-bug { background: #a8b820; color: #333; }
        .type-ghost { background: #705898; }
        .type-steel { background: #b8b8d0; color: #333; }
        .type-normal { background: #a8a878; color: #333; }

        .stats {
            font-size: .75rem;
            margin-top: .4rem;
            color: #aaa;
        }

        .delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #c1121f;
            border: none;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            font-size: .7rem;
            line-height: 1;
            opacity: 0;
            transition: opacity .2s;
        }

        .card:hover .delete-btn { opacity: 1; }

        .empty {
            text-align: center;
            padding: 3rem;
            color: #666;
            font-size: 1.1rem;
        }

        #catching {
            display: none;
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pokemon Trader</h1>
        <div id="trainer-info">Chargement...</div>
    </header>

    <div id="notification"></div>

    <main>
        <div class="actions">
            <button onclick="catchPokemon()" id="catch-btn">Attraper un Pokemon</button>
            <button onclick="refreshCollection()">Rafraichir</button>
        </div>

        <div class="trade-form">
            <span>Echanger :</span>
            <input type="text" id="target-ip" placeholder="IP du trader (ex: 192.168.1.102)">
            <button onclick="sendTrade()" id="trade-btn">Envoyer le Pokemon selectionne</button>
        </div>

        <div id="catching">Recherche dans les hautes herbes...</div>

        <div id="collection" class="collection"></div>
    </main>

    <script>
        let selectedPokemonId = null;

        async function catchPokemon() {
            const btn = document.getElementById('catch-btn');
            const catching = document.getElementById('catching');
            btn.disabled = true;
            catching.style.display = 'block';

            try {
                const res = await fetch('/api/catch', { method: 'POST' });
                if (!res.ok) throw new Error(await res.text());
                const pokemon = await res.json();
                notify(`${pokemon.name} attrapé !`);
                refreshCollection();
            } catch (e) {
                notify('Echec : ' + e.message, true);
            } finally {
                btn.disabled = false;
                catching.style.display = 'none';
            }
        }

        async function refreshCollection() {
            try {
                const res = await fetch('/api/collection');
                const pokemons = await res.json();
                renderCollection(pokemons);
                loadInfo();
            } catch (e) {
                notify('Erreur de connexion', true);
            }
        }

        async function loadInfo() {
            try {
                const res = await fetch('/api/info');
                const info = await res.json();
                document.getElementById('trainer-info').textContent =
                    `${info.trainer} — ${info.pokemon_count} Pokemon`;
            } catch (e) {}
        }

        function renderCollection(pokemons) {
            const container = document.getElementById('collection');

            if (!pokemons || pokemons.length === 0) {
                container.innerHTML = '<div class="empty">Aucun Pokemon. Attrapez-les tous !</div>';
                return;
            }

            container.innerHTML = pokemons.map(p => `
                <div class="card ${selectedPokemonId === p.id ? 'selected' : ''}"
                     onclick="selectPokemon(${p.id})">
                    <button class="delete-btn" onclick="event.stopPropagation(); deletePokemon(${p.id})" title="Relacher">X</button>
                    <img src="${p.sprite}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="types">
                        ${p.types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('')}
                    </div>
                    <div class="stats">HP: ${p.hp} | ATK: ${p.attack}</div>
                </div>
            `).join('');
        }

        async function deletePokemon(id) {
            try {
                const res = await fetch('/api/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pokemon_id: id }),
                });
                if (!res.ok) throw new Error(await res.text());
                notify('Pokemon relache !');
                if (selectedPokemonId === id) selectedPokemonId = null;
                refreshCollection();
            } catch (e) {
                notify('Erreur : ' + e.message, true);
            }
        }

        function selectPokemon(id) {
            selectedPokemonId = (selectedPokemonId === id) ? null : id;
            refreshCollection();
        }

        async function sendTrade() {
            if (!selectedPokemonId) {
                notify('Selectionnez un Pokemon d\'abord', true);
                return;
            }

            const targetIP = document.getElementById('target-ip').value.trim();
            if (!targetIP) {
                notify('Entrez l\'IP du trader', true);
                return;
            }

            const btn = document.getElementById('trade-btn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/trade/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target_ip: targetIP,
                        pokemon_id: selectedPokemonId,
                    }),
                });

                if (!res.ok) throw new Error(await res.text());
                const result = await res.json();
                notify(`${result.pokemon} envoyé à ${result.to} !`);
                selectedPokemonId = null;
                refreshCollection();
            } catch (e) {
                notify('Echec du trade : ' + e.message, true);
            } finally {
                btn.disabled = false;
            }
        }

        function notify(msg, isError = false) {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.style.background = isError ? '#c1121f' : '#2d6a4f';
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        // Poll for new Pokemon every 5 seconds (to see trades coming in)
        setInterval(refreshCollection, 5000);

        // Initial load
        refreshCollection();
    </script>
</body>
</html>
