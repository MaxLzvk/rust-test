services:
  pokemon-trader:
    build: ./pokemon-trader
    restart: unless-stopped

  maze-runner:
    build: ./maze-runner
    restart: unless-stopped

  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pokemon-trader
      - maze-runner
    restart: unless-stopped
